# EddyFusion — 数据根路径与划分（命题方数据就绪后填写）
meta:
  project: "EddyFusion"
  version: "1.0"

paths:
  # 命题方数据目录（仓库根目录下）
  raw_root: "服创数据集"
  # 水文/海域 NetCDF 子目录名以本机为准（常见「海域要素预测」或「水文要素预测」）
  hydro_subdir: "海域要素预测"
  processed_root: "data/processed"

spatial:
  # 海域要素预测示例文件（19940101.nc）经纬度范围，命题方若有差异以实测为准
  lon_min: 117.0
  lon_max: 127.0
  lat_min: 31.04
  lat_max: 41.0

temporal:
  time_step_hours: 6   # 与预处理一致

split:
  # 若命题方提供固定划分，改为 list 路径或名称映射
  strategy: "time_outer"   # time_outer | fixed_files
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

normalization:
  stats_dir: "data/processed/stats"   # 全局均值方差等

# 水文：从海域要素预测 NetCDF 生成 npz 时的可选限制（null 表示不限制）
hydro_preprocess:
  # 仅处理排序后的前 N 个日文件；开发机可先设为 120～400，全量设为 null
  max_daily_files: null
  # 滑窗起点步长；12 表示约每「日文件」取一个窗口（单日 12 时刻时）
  window_stride: 1
