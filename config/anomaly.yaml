# EddyFusion — 风-浪异常与台风关联（Level 2 双任务 + 3σ 基线）
meta:
  project: "EddyFusion"
  module: "anomaly"
  version: "1.0"
  level: 2
  seed: 42

paths:
  train_sequences: "data/processed/anomaly/train.npz"
  val_sequences: "data/processed/anomaly/val.npz"
  test_sequences: "data/processed/anomaly/test.npz"
  typhoon_index: "data/processed/anomaly/typhoon_index.json"   # CMA/IBTrACS 预处理后
  output_dir: "outputs/anomaly"

data:
  window_hours: 48
  horizon_hours: 1
  sigma_scope: "grid_month"   # grid_month | grid | global

model:
  backbone: "lstm_cnn"        # 占位，实现时与 model.py 对齐
  hidden_dim: 128

train:
  device: "cuda"
  epochs: 50
  batch_size: 32
  lr: 0.001
  amp: true

eval:
  metrics_file: "outputs/anomaly/metrics_summary.json"
  save_preds: true
