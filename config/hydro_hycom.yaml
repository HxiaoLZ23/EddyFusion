# 与「海域要素预测」HYCOM 日文件对齐的简化水文配置（仅 sst/sss/ssu/ssv → 四要素，无风速/波高）
# 网格与示例 NetCDF 一致：lat 138 × lon 125；单文件 time=12，长序列需预处理多文件拼接

meta:
  project: "EddyFusion"
  module: "hydro"
  version: "1.0"
  level: 2
  seed: 42

# 仅使用 data/processed/hydro/（水文 npz）；anomaly/eddy 等子目录为空属正常，需另跑对应预处理才会写入
paths:
  train_data: "data/processed/hydro/X_train.npz"
  train_label: "data/processed/hydro/y_train.npz"
  val_data: "data/processed/hydro/X_val.npz"
  val_label: "data/processed/hydro/y_val.npz"
  test_data: "data/processed/hydro/X_test.npz"
  test_label: "data/processed/hydro/y_test.npz"
  output_dir: "outputs/hydro"

data:
  input_features: ["temp", "sal", "u", "v"]
  target_features: ["temp", "sal", "u", "v"]
  # 命题方：输入 [t−n,…,t]、输出未来 72 小时；hourly 时 output_steps=72（见 docs/命题方数据集说明.md）
  input_days: 7
  input_steps: 168
  output_hours: [72]
  output_steps: 72
  grid_shape: [138, 125]
  normalize:
    temp: "zscore"
    sal: "zscore"
    u: "zscore"
    v: "zscore"
  num_workers: 0
  pin_memory: false

model:
  name: "ConvLSTM_Hydro"
  hidden_dim: 128
  num_layers: 3
  kernel_size: 3
  dropout: 0.1
  use_element_attention: true
  element_attention_hidden: 64
  # 长序列(如 168 步)训练时显著降低激活显存；推理可关以提速
  encoder_checkpoint: true

mot:
  enabled: false

attn_res:
  enabled: false
  type: "block"
  num_blocks: 8

loss:
  base: "mse"
  mae_weight: 0.1
  eos_constraint:
    enabled: false
    weight: 0.1
    mode: "soft"

train:
  device: "cuda"
  epochs: 60
  # 长序列+高分辨率网格易 OOM；可配合 gradient_accumulation_steps 维持等效 batch
  batch_size: 1
  gradient_accumulation_steps: 2
  eval_batch_size: 1
  optimizer: "adamw"
  # 若 train/val 出现 nan，可先降到 1e-4 或设 amp: false，并检查预处理 npz
  lr: 0.0001
  weight_decay: 0.01
  scheduler: "cosine"
  warmup_epochs: 3
  grad_clip_norm: 1.0
  amp: true
  early_stop_patience: 10
  log_interval: 50
  save_best_by: "val_nrmse_avg"
  checkpoint_every_epoch: 1

eval:
  metrics: ["rmse", "nrmse", "mae"]
  report_horizons_hours: [72]
  save_preds: true
  save_metrics_json: true
  # eval 写入 metrics_summary_val.json / metrics_summary_test.json（由 --split 决定）
  metrics_file: "outputs/hydro/metrics_summary.json"
  tag_fields: ["level", "mot.enabled", "attn_res.enabled"]
